name: Deploy to GitHub Pages
   on:
     push:
       branches: [main]
   jobs:
     deploy:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4
         - uses: oven-sh/setup-bun@v1
         - run: bun install
         - run: bun run build
         - uses: actions/upload-pages-artifact@v3
           with:
             path: build/
         - uses: actions/deploy-pages@v4

